name: Bot Polling

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: bot_offset.txt
          key: bot-offset

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python bot_polling.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
